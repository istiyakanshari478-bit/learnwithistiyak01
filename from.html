<div class="form-box">

<h2>Fill Your Details</h2>

<form action="certificate.html">

<input type="text" name="name" placeholder="Student Name" required>

<input type="text" name="course" placeholder="Course Name" required>
<input type="text" id="score" name="score">

<input type="text" id="percentage" name="percentage">

<input type="text" id="result" name="result">

<input type="text" name="Father's Name" placeholder="Father's Name" required>

<input type="text" name="Mother's Name" placeholder="Mother's Name" required>


<a href="certificate.html"><button type="submit">Generate Certificate</button></a>

</form>


</div>
<script>
function openForm(name,score,percentage,status){

window.location.href =
"form.html?name="+name+
"&score="+score+
"&percentage="+percentage+
"&result="+status;

}
</script>
<script>

var params = new URLSearchParams(window.location.search);

document.getElementById("score").value = params.get("score");
document.getElementById("percentage").value = params.get("percentage");
document.getElementById("result").value = params.get("result");

</script>
